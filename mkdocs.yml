site_name: PyFlexo
site_description: Documentation for the PyFlexo WSGI framework and ORM

# Keep the repo placeholders explicit so the docs build can be wired up later.
repo_name: PyFlexo
repo_url: https://github.com/mukarramboy/py-flexo-docs
edit_uri: ''

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.share

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting Started:
    - Getting Started: getting-started.md
  - Concepts:
    - Core Concepts: core-concepts.md
  - Features:
    - ORM: orm/README.md
  - API Reference: api-reference.md
  - Deployment: deployment.md
  - Changelog: changelog.md
